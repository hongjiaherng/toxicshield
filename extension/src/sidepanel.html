<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToxicShield Workspace</title>
  <style>
    :root {
      --primary: #ffffff;
      --primary-hover: #cccccc;
      --bg-color: #000000;
      --surface: #0a0a0a;
      --surface-light: #1a1a1a;
      --text: #ffffff;
      --text-muted: #888888;
      --danger: #ff0000;
      --success: #0070f3;
      --border: #333333;
      --primary-soft: rgba(255, 255, 255, 0.1);
    }
    
    [data-theme='light'] {
      --primary: #000000;
      --primary-hover: #333333;
      --bg-color: #ffffff;
      --surface: #fafafa;
      --surface-light: #eaeaea;
      --text: #000000;
      --text-muted: #666666;
      --border: #eaeaea;
      --primary-soft: rgba(0, 0, 0, 0.05);
    }
    
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text);
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 20px;
      transition: background-color 0.3s, color 0.3s;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .shield-icon {
      color: var(--primary);
    }

    #theme-toggle {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: auto;
      transition: background-color 0.2s, color 0.2s;
    }

    #theme-toggle:hover {
      background-color: var(--surface-light);
      color: var(--text);
    }

    .description {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin: 0;
      line-height: 1.5;
    }

    #input-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    textarea {
      width: 100%;
      height: 100px;
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      color: var(--text);
      font-family: inherit;
      resize: vertical;
      box-sizing: border-box;
      transition: background-color 0.3s, border-color 0.3s, color 0.3s;
    }
    
    textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    .engine-switch-container {
      text-align: center;
      margin-top: auto; /* Push it to the bottom */
      padding-top: 15px;
    }

    #engine-status {
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    #engine-switch-btn {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-decoration: underline;
      cursor: pointer;
      transition: color 0.2s;
    }

    #engine-switch-btn:hover {
      color: var(--primary);
    }

    button {
      background-color: var(--primary);
      color: var(--bg-color);
      border: 1px solid var(--primary);
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      width: 100%;
    }

    button:hover {
      background-color: var(--primary-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      background-color: var(--surface-light);
      color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
    }
    
    #btn-why {
        background-color: transparent;
        border: 1px solid var(--primary);
        color: var(--primary);
        margin-top: 10px;
        display: none;
    }
    
    #btn-why:hover {
        background-color: var(--primary-soft);
    }

    #result-container {
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 12px;
      animation: fadeIn 0.3s ease-out;
      transition: background-color 0.3s, border-color 0.3s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .label-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .label-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    #toxicity-label {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .toxic { color: var(--danger); }
    .safe { color: var(--success); }

    .confidence-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .confidence-bar-bg {
      height: 8px;
      background-color: var(--bg-color);
      border-radius: 4px;
      overflow: hidden;
      transition: background-color 0.3s;
    }

    #confidence-bar-fill {
      height: 100%;
      width: 0%;
      background-color: var(--primary);
      transition: width 0.5s ease-out;
    }

    #confidence-text {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: right;
    }
    
    #explanation-container {
        display: none;
        background-color: var(--primary-soft);
        border-left: 3px solid var(--primary);
        padding: 12px 16px;
        border-radius: 0 8px 8px 0;
        margin-top: 10px;
        font-size: 0.9rem;
        line-height: 1.6;
        color: var(--text);
        animation: fadeIn 0.5s ease-out;
        transition: background-color 0.3s;
    }

    #error-message {
      color: var(--danger);
      font-size: 0.9rem;
      display: none;
      padding: 12px;
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 6px;
    }

    #loader {
      display: none;
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-muted);
      padding: 10px 0;
    }
    
    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
    <div class="header-top">
      <h1>
        <svg class="shield-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
        ToxicShield
      </h1>
      <button id="theme-toggle" aria-label="Toggle Theme">
        <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>
    
    <p class="description">Select text and right click, or paste text below to analyze its toxicity.</p>
    
    <div id="error-message"></div>

    <div id="input-container">
        <textarea id="text-input" placeholder="Paste or type text here..."></textarea>
        <button id="analyze-btn">Analyze Validity</button>
    </div>

    <div id="loader">Analyzing models<span class="dots"></span></div>

    <div id="result-container">
      <div class="label-container">
        <span class="label-title">Result</span>
        <span id="toxicity-label"></span>
      </div>
      <div class="confidence-container">
        <span class="label-title">Confidence</span>
        <div class="confidence-bar-bg">
          <div id="confidence-bar-fill"></div>
        </div>
        <span id="confidence-text">0%</span>
      </div>
      
      <button id="btn-why">Why is this classified this way?</button>
      <div id="explanation-container"></div>
    </div>

    <div class="engine-switch-container">
        <span id="engine-status">Engine: Local (Browser)</span> | <a href="#" id="engine-switch-btn">Switch to Remote API</a>
    </div>

  <script src="../dist/sidepanel.js"></script>
</body>
</html>
